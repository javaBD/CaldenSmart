name: caldensmart
description: "Caldén Smart"
publish_to: "none"
version: 1.0.83+100

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  flutter_blue_plus: ^1.35.1
  easy_refresh: ^3.4.0
  geolocator: ^13.0.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  amplify_flutter: ^2.4.0
  amplify_auth_cognito: ^2.4.0
  mqtt_client: ^10.2.0
  firebase_messaging: ^14.7.10
  firebase_core: ^2.27.1
  aws_dynamodb_api: ^2.0.0
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^17.1.1
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  wifi_scan: ^0.4.1
  google_fonts: ^6.2.1
  hugeicons: ^0.0.7
  day_night_time_picker: ^1.3.1
  image_picker: ^1.1.2
  upgrader: ^11.3.0
  firebase_crashlytics: ^3.5.7
  fluttertoast: ^8.2.11
  home_widget: ^0.8.1
  http: ^1.3.0
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.69.0
  msgpack_dart: ^1.0.1
  in_app_review: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  icons_launcher: ^2.1.6
  flutter_native_splash: ^2.0.4

icons_launcher:
  image_path: "assets/LogoApp.png"
  platforms:
    ios:
      enable: true
      image_path: "assets/LogoApp.png"
    android:
      enable: true
      image_path: "assets/LogoApp.png"
      adaptive_background_image: "assets/Background.png"
      adaptive_foreground_image: "assets/DragonForeground.png"

flutter_native_splash:
  color: "#000000"
  image: assets/DragonForeground.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    # Assets principales
    - assets/Background.png
    - assets/DragonForeground.png
    - assets/LogoApp.png

    # Assets branch
    - assets/branch/Banner.png
